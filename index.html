<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />

  <title>Bohrkernansprache ISO 14688</title>

  <!-- iOS & Android Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bohrkern" />

  <!-- 1. WICHTIG: Überall ./ vor den Pfaden ergänzt -->
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  
  <!-- Optionales Manifest (falls du es angelegt hast) -->
  <!-- <link rel="manifest" href="./manifest.webmanifest"> -->
  
  <!-- 2. WICHTIG: defer hinzugefügt, damit das Handy erst lädt, wenn das HTML fertig ist -->
  <script src="./js/app.js" defer></script>
</head>

<body>
  <header>
    <div class="logo-container">
      <img src="./assets/icon.svg" alt="Firmenlogo" width="44" height="44" />
    </div>
    <h1>ISO 14688 Bohrkernansprache</h1>
  </header>

  <main>
    <details class="project-details" open>
      <summary>
        <div class="summary-content">
          <span class="depth-summary">Projektdaten</span>
          <span class="type-summary">Allgemeine Informationen zur Bohrung</span>
        </div>
        <div class="expand-icon">▼</div>
      </summary>

      <div class="details-body grid" id="project-form">
        <div><label>Projekt</label><input type="text" id="p-projekt" placeholder="Projektname"></div>
        <div><label>Auftraggeber</label><input type="text" id="p-auftraggeber" placeholder="Kunde"></div>
        <div><label>Kostenstelle</label><input type="text" id="p-kostenstelle" placeholder="Nummer"></div>
        <div><label>Bohrlochnummer</label><input type="text" id="p-bohrloch" placeholder="z.B. B1"></div>
        <div><label>Maschinentyp</label><input type="text" id="p-maschine" placeholder="Gerät"></div>
        <div><label>Bohrmeister</label><input type="text" id="p-meister" placeholder="Name"></div>
        <div><label>Verfasser</label><input type="text" id="p-verfasser" placeholder="Geologe / Techniker"></div>
        <div><label>Datum</label><input type="date" id="p-datum"></div>
        <div><label>Bohrbeginn</label><input type="time" id="p-beginn"></div>
        <div><label>Bohrende</label><input type="time" id="p-ende"></div>
      </div>
    </details>

    <div id="layers-container"></div>

    <button class="btn btn-primary add-layer-btn" onclick="addLayer()">
      + Neue Schicht hinzufügen
    </button>
  </main>

  <div class="actions-bar">
    <button class="btn" onclick="exportTXT()">TXT Protokoll</button>
    <button class="btn" onclick="exportCSV()">CSV Export</button>
    <button class="btn btn-primary" onclick="copyToClipboard()">📋 Kopieren</button>
  </div>

</body>
</html>
