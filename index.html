<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HTB Bohrkernaufnahme</title>
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="launchericon-192x192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="logo.svg" alt="HTB Logo">
    </div>

    <div class="header-text">
      <h1>HTB Bohrkernaufnahme</h1>
      <p>ÖNORM EN ISO 14688</p>
    </div>

    <div class="header-actions">
      <button class="btn btn--ghost btn--sm"
              id="btnQuickMode"
              type="button"
              aria-pressed="true">
        Schnellmodus: EIN
      </button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab is-active" type="button" data-tab="doku">Dokumentation</button>
    <button class="tab"           type="button" data-tab="verlauf">Verlauf</button>
    <button class="tab"           type="button" data-tab="photo">Fotodoku</button>
  </nav>

  <!-- TAB: Dokumentation -->
  <div class="pane is-active" id="tab-doku">

    <details class="sectionAcc" id="metaAcc" open>
      <summary>
        <div class="sectionAcc__head">
          <span class="sectionAcc__title">Stammdaten</span>
          <span class="sectionAcc__meta" id="metaAccMeta">Projekt, Bohrung, Datum</span>
        </div>
      </summary>

      <div class="sectionAcc__body">
        <div class="form-grid">
          <label class="field">
            <span class="field__label">Datum</span>
            <input class="field__input" type="date" id="meta-date">
          </label>

          <label class="field">
            <span class="field__label">Bearbeiter</span>
            <input class="field__input" type="text" id="meta-user" placeholder="Name">
          </label>

          <label class="field">
            <span class="field__label">Projekt</span>
            <input class="field__input" type="text" id="meta-project" placeholder="Projektname">
          </label>

          <label class="field">
            <span class="field__label">Bohrung / Aufschluss</span>
            <input class="field__input" type="text" id="meta-borehole" placeholder="z.B. B1">
          </label>

          <label class="field">
            <span class="field__label">Ort / Abschnitt</span>
            <input class="field__input" type="text" id="meta-location" placeholder="Standort">
          </label>

          <label class="field">
            <span class="field__label">Bohrverfahren / Gerät</span>
            <input class="field__input" type="text" id="meta-device" placeholder="Bohrgerät">
          </label>

          <label class="field field--wide">
            <span class="field__label">Bemerkung gesamt</span>
            <textarea class="field__textarea"
                      id="meta-note"
                      placeholder="Allgemeine Bemerkungen zur Bohrung …"></textarea>
          </label>
        </div>
      </div>
    </details>

    <div class="quickModeHint text" id="quickModeHint"></div>

    <div id="layerList"></div>

    <div class="addLayerWrap">
      <button class="btn btn--primary" id="btnAddLayer" type="button">
        + Schicht hinzufügen
      </button>
    </div>
  </div>

  <!-- TAB: Verlauf -->
  <div class="pane" id="tab-verlauf" hidden>
    <section class="section">
      <div class="section-title">Gespeicherte Dokumentationen</div>
      <div id="historyList"></div>
    </section>

    <section class="section">
      <div class="section-title">Gespeicherte Fotodokus</div>
      <div id="photoHistoryListMirror"></div>
    </section>
  </div>

  <!-- TAB: Fotodoku -->
  <div class="pane" id="tab-photo" hidden>
    <section class="section">
      <div class="section-title">Kerndokumentation – Fotos</div>

      <div class="form-grid">
        <label class="field">
          <span class="field__label">Projekt</span>
          <input class="field__input" type="text" id="photo-project" placeholder="Projektname">
        </label>

        <label class="field">
          <span class="field__label">Aufschluss / Bohrung</span>
          <input class="field__input" type="text" id="photo-borehole" placeholder="z.B. B1">
        </label>

        <label class="field">
          <span class="field__label">Kernende [m]</span>
          <input class="field__input" type="number" step="0.1" min="0"
                 id="photo-end-depth" placeholder="z.B. 10">
        </label>
      </div>

      <button class="btn btn--ghost" id="btnGenerateBoxes" type="button">
        Kernkisten generieren
      </button>

      <div class="section-title" style="margin-top:20px">Kernkisten wählen</div>
      <div id="photoBoxList"></div>

      <div id="photoSelectedBox" class="photoSelectedBox"></div>

      <label class="field" style="margin-top:12px">
        <span class="field__label">Notiz zur Kernkiste</span>
        <textarea class="field__textarea" id="photo-note"
                  placeholder="Notiz zur gewählten Kernkiste …"></textarea>
      </label>

      <div class="photo-btn-row">
        <button class="btn btn--photo" id="btnTakePhoto" type="button">
          Foto aufnehmen
        </button>
        <button class="btn btn--ghost" id="btnPhotoClear" type="button">
          Entwurf löschen
        </button>
        <button class="btn btn--primary" id="btnPhotoSave" type="button">
          Speichern
        </button>
      </div>

      <input type="file"
             id="photo-files"
             accept="image/*"
             capture="environment"
             multiple
             style="display:none">

      <div class="section-title" style="margin-top:20px">Vorschau neue Fotos</div>
      <div id="photoPreviewList"></div>

      <div class="section-title" style="margin-top:20px">Gespeicherte Fotodokus</div>
      <div id="photoHistoryList"></div>
    </section>
  </div>

  <!-- Floating Foto Button -->
  <button class="photo-float-btn" id="btnPhotoFloat" type="button">
    Foto
  </button>

  <!-- Fixe Aktionsleiste -->
  <div class="actions-bar">
    <button class="btn btn--ghost" id="btnSave"  type="button">Speichern</button>
    <button class="btn btn--ghost" id="btnCsv"   type="button">CSV</button>
    <button class="btn btn--ghost" id="btnJson"  type="button">JSON</button>
    <button class="btn btn--primary" id="btnPdf" type="button">Bericht / PDF</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
