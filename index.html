<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bohrkernansprache ISO 14688</title>

  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="assets/icon.svg" alt="Firmenlogo" width="44" height="44">
    </div>
    <h1>ISO 14688 Bohrkernansprache</h1>
  </header>

  <main>
    <!-- Projektdaten -->
    <details class="project-details" open>
      <summary>
        <div class="summary-content">
          <span class="depth-summary">Projektdaten</span>
          <span class="type-summary">Allgemeine Informationen zur Bohrung</span>
        </div>
        <div class="expand-icon">▼</div>
      </summary>

      <div class="details-body grid" id="project-form">
        <div>
          <label for="p-projekt">Projekt</label>
          <input type="text" id="p-projekt" placeholder="Projektname">
        </div>

        <div>
          <label for="p-auftraggeber">Auftraggeber</label>
          <input type="text" id="p-auftraggeber" placeholder="Kunde">
        </div>

        <div>
          <label for="p-kostenstelle">Kostenstelle</label>
          <input type="text" id="p-kostenstelle" placeholder="Nummer">
        </div>

        <div>
          <label for="p-bohrloch">Bohrlochnummer</label>
          <input type="text" id="p-bohrloch" placeholder="z.B. B1">
        </div>

        <div>
          <label for="p-maschine">Maschinentyp</label>
          <input type="text" id="p-maschine" placeholder="Gerät">
        </div>

        <div>
          <label for="p-meister">Bohrmeister</label>
          <input type="text" id="p-meister" placeholder="Name">
        </div>

        <div>
          <label for="p-verfasser">Verfasser</label>
          <input type="text" id="p-verfasser" placeholder="Geologe / Techniker">
        </div>

        <div>
          <label for="p-datum">Datum</label>
          <input type="date" id="p-datum">
        </div>

        <div>
          <label for="p-beginn">Bohrbeginn</label>
          <input type="time" id="p-beginn">
        </div>

        <div>
          <label for="p-ende">Bohrende</label>
          <input type="time" id="p-ende">
        </div>
      </div>
    </details>

    <!-- Schichten -->
    <div id="layers-container"></div>

    <button class="btn btn-primary add-layer-btn" onclick="addLayer()">
      + Neue Schicht hinzufügen
    </button>
  </main>

  <!-- Fixe Aktionsleiste -->
  <div class="actions-bar">
    <button class="btn" onclick="exportTXT()">TXT Protokoll</button>
    <button class="btn" onclick="exportCSV()">CSV Export</button>
    <button class="btn btn-primary" onclick="copyToClipboard()">📋 Kopieren</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
