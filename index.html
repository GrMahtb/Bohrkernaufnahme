    <h1>ISO 14688 Bohrkernansprache</h1>
  </header>

  <main>
    <!-- ═══ PROJEKTDATEN ═══ -->
    <details class="project-details" open>
      <summary>
        <div class="summary-content">
          <span class="depth-summary">Projektdaten</span>
          <span class="type-summary">Allgemeine Informationen zur Bohrung</span>
        </div>
        <div class="expand-icon">▼</div>
      </summary>
      <div class="details-body grid" id="project-form">
        <div><label>Projekt</label>
        <input type="text" id="p-projekt" placeholder="Projektname"></div>

        <div><label>Auftraggeber</label>
        <input type="text" id="p-auftraggeber" placeholder="Kunde"></div>

        <div><label>Kostenstelle</label>
        <input type="text" id="p-kostenstelle" placeholder="Nummer"></div>

        <div><label>Bohrlochnummer</label>
        <input type="text" id="p-bohrloch" placeholder="z.B. B1"></div>

        <div><label>Maschinentyp</label>
        <input type="text" id="p-maschine" placeholder="Gerät"></div>

        <div><label>Bohrmeister</label>
        <input type="text" id="p-meister" placeholder="Name"></div>

        <div><label>Verfasser</label>
        <input type="text" id="p-verfasser" placeholder="Geologe / Techniker"></div>

        <div><label>Datum</label>
        <input type="date" id="p-datum"></div>

        <div><label>Bohrbeginn</label>
        <input type="time" id="p-beginn"></div>

        <div><label>Bohrende</label>
        <input type="time" id="p-ende"></div>
      </div>
    </details>

    <!-- ═══ SCHICHTEN (dynamisch per JS) ═══ -->
    <div id="layers-container"></div>

    <button class="btn btn-primary add-layer-btn" onclick="addLayer()">
      + Neue Schicht hinzufügen
    </button>
  </main>

  <!-- ═══ FIXE AKTIONSLEISTE UNTEN ═══ -->
  <div class="actions-bar">
    <button class="btn" onclick="exportTXT()">TXT Protokoll</button>
    <button class="btn" onclick="exportCSV()">CSV Export</button>
    <button class="btn btn-primary" onclick="copyToClipboard()">📋 Kopieren</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
